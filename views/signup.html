<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h2>Signup</h2>

<input id="username" class="form-control mb-2" placeholder="Username">
<input id="firstname" class="form-control mb-2" placeholder="First name">
<input id="lastname" class="form-control mb-2" placeholder="Last name">
<input id="password" type="password" class="form-control mb-2" placeholder="Password">

<button id="signupBtn" class="btn btn-primary">Create Account</button>

<p class="mt-3">
    Already have an account?
    <a href="login.html">Login</a>
</p>

<script>
    document.getElementById('signupBtn').onclick = async () => {
        const username = document.getElementById('username').value.trim();
        const firstname = document.getElementById('firstname').value.trim();
        const lastname = document.getElementById('lastname').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !firstname || !lastname || !password) {
            return alert('All fields are required');
        }

        const res = await fetch('http://localhost:3000/api/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, firstname, lastname, password })
        });

        const data = await res.json();

        if (res.ok) {
            alert('Signup successful. Please login.');
            window.location.href = 'login.html';
        } else {
            alert(data.message || 'Signup failed');
        }
    };
</script>

</body>
</html>
