<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3 id="welcome"></h3>
    <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
</div>

<div class="row g-3">
    <div class="col-md-4">
        <div class="card p-3 mb-3">
            <label class="form-label">Choose Room</label>
            <select id="roomSelect" class="form-select mb-2">
                <option value="Hunting">Hunting</option>
                <option value="Fishing">Fishing</option>
                <option value="Camping">Camping</option>
                <option value="Hiking">Hiking</option>
                <option value="RoadTrips">Road trips</option>
            </select>

            <div class="d-flex gap-2">
                <button id="joinBtn" class="btn btn-primary">Join Room</button>
                <button id="leaveBtn" class="btn btn-secondary">Leave Room</button>
            </div>

            <div class="mt-2">
                <strong>Current Room:</strong> <span id="currentRoom">None</span>
            </div>
        </div>

        <div class="card p-3">
            <label class="form-label">Private Message</label>
            <input id="toUser" class="form-control mb-2" placeholder="Send to username (e.g., adel1)">
            <div class="d-flex gap-2">
                <input id="pmInput" class="form-control" placeholder="Type private message...">
                <button id="pmSendBtn" class="btn btn-warning">Send</button>
            </div>
            <small class="text-muted mt-2 d-block">
                Tip: the other user must be logged in to receive instantly.
            </small>
        </div>
    </div>

    <div class="col-md-8">
        <div class="card p-3 mb-3">
            <div id="messages" style="height:320px; overflow-y:auto; border:1px solid #ddd; padding:10px;"></div>

            <div class="mt-2 d-flex gap-2">
                <input id="msgInput" class="form-control" placeholder="Type a room message...">
                <button id="sendBtn" class="btn btn-success">Send</button>
            </div>

            <small id="typingText" class="text-muted mt-1"></small>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
    const username = localStorage.getItem('username');
    if (!username) window.location.href = 'login.html';

    document.getElementById('welcome').innerText = `Welcome, ${username}`;

    const socket = io();
    let activeRoom = null;
    let typingTimer = null;



    socket.emit('register_user', username);

    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('username');
        window.location.href = 'login.html';
    };

    const appendMessage = (text) => {
        const box = document.getElementById('messages');
        const div = document.createElement('div');
        div.innerText = text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    };

    document.getElementById('joinBtn').onclick = () => {
        const room = document.getElementById('roomSelect').value;

        if (activeRoom) socket.emit('leave_room', activeRoom);

        activeRoom = room;
        socket.emit('join_room', room);

        document.getElementById('currentRoom').innerText = room;
        document.getElementById('messages').innerHTML = '';
        appendMessage(`(system) Joined room: ${room}`);
    };

    document.getElementById('leaveBtn').onclick = () => {
        if (!activeRoom) return;

        socket.emit('leave_room', activeRoom);
        appendMessage(`(system) Left room: ${activeRoom}`);

        activeRoom = null;
        document.getElementById('currentRoom').innerText = 'None';
    };


    document.getElementById('sendBtn').onclick = () => {
        const msg = document.getElementById('msgInput').value.trim();
        if (!activeRoom) return alert('Join a room first');
        if (!msg) return;

        socket.emit('room_message', {
            room: activeRoom,
            from_user: username,
            message: msg
        });

        document.getElementById('msgInput').value = '';
    };


    socket.on('room_message', (data) => {
        if (!activeRoom || data.room !== activeRoom) return;
        appendMessage(`${data.from_user}: ${data.message}`);
    });

    socket.on('typing_private', (data) => {
        if (data.to_user === username) {
            document.getElementById('typingText').innerText = `${data.from_user} is typing...`;
        }
    });

    socket.on('stop_typing_private', (data) => {
        if (data.to_user === username) {
            document.getElementById('typingText').innerText = '';
        }
    });



    document.getElementById('pmSendBtn').onclick = () => {
        const to_user = document.getElementById('toUser').value.trim();
        const msg = document.getElementById('pmInput').value.trim();

        if (!to_user) return alert('Enter a username to send to');
        if (!msg) return;

        socket.emit('private_message', {
            from_user: username,
            to_user: to_user,
            message: msg
        });

        document.getElementById('pmInput').value = '';
    };


    socket.on('private_message', (data) => {
        if (data.from_user === username) {
            appendMessage(`[PM to ${data.to_user}] ${data.message}`);
        } else if (data.to_user === username) {
            appendMessage(`[PM from ${data.from_user}] ${data.message}`);
        } else {

        }
    });

    document.getElementById('pmInput').addEventListener('input', () => {
        const to_user = document.getElementById('toUser').value.trim();
        if (!to_user) return;

        socket.emit('typing_private', { from_user: username, to_user });

        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            socket.emit('stop_typing_private', { from_user: username, to_user });
        }, 800);
    });

</script>

</body>
</html>
